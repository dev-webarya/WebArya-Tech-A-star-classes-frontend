<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Beige background -->
  <rect width="200" height="200" fill="#F5EFE7"/>
  
  <!-- Red triangle (top) -->
  <polygon points="100,20 130,75 70,75" fill="#E63946"/>
  
  <!-- Blue triangle (left) -->
  <polygon points="70,75 35,115 50,90" fill="#1D5A96"/>
  
  <!-- Green triangle (right) -->
  <polygon points="130,75 165,115 150,90" fill="#2DB876"/>
  
  <!-- Blue bottom left -->
  <polygon points="50,90 25,145 50,120" fill="#1D5A96"/>
  
  <!-- Green bottom right -->
  <polygon points="150,90 175,145 150,120" fill="#2DB876"/>
  
  <!-- White star -->
  <polygon points="100,30 125,65 155,65 130,85 150,120 100,90 50,120 70,85 45,65 75,65" fill="white"/>
  
  <!-- Yellow 'A' -->
  <text x="100" y="115" font-size="50" font-weight="bold" fill="#F4D35E" text-anchor="middle" font-family="Arial, sans-serif">A</text>
</svg>
